<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Радиус — Визитка</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=PT+Mono&display=swap" rel="stylesheet" />
    <style>
      @page { size: 90mm 50mm; margin: 0; }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: #1a1a1a; }
      body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      .card { width: 90mm; height: 50mm; overflow: hidden; }
      svg { display: block; width: 100%; height: 100%; }
      @media screen {
        .card { width: 810px; height: 450px; box-shadow: 0 12px 60px rgba(0,0,0,.9); }
      }
      @media print {
        html, body { background: #000; min-height: 0; display: block; }
        .card { width: 90mm; height: 50mm; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!--
        ViewBox 900×500, center cx=450 cy=250

        CW full-circle  M(cx+r, cy) sweep=1:
          0%  / 100% = право    (3 ч)
          25%         = низ     (6 ч)
          50%         = лево    (9 ч)
          75%         = верх    (12 ч)

        CCW full-circle M(cx+r, cy) sweep=0:
          0%  / 100% = право    (3 ч)
          25%         = верх    (12 ч)
          50%         = лево    (9 ч)
          75%         = низ     (6 ч)

        Пять надписей покрывают все стороны:
          #0  CW  75%  →  верх-центр        (12 ч)
          #1  CW  87%  →  верх-право        (1:30)
          #2  CCW 75%  →  низ-центр         (6 ч)
          #3  CW  62%  →  верх-лево         (10:30)
          #4  CCW 62%  →  низ-лево          (7:30)
      -->
      <svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">

        <defs id="card-defs">
          <clipPath id="card-clip">
            <rect x="0" y="0" width="900" height="500" />
          </clipPath>
        </defs>

        <rect width="900" height="500" fill="#080808" />
        <g id="ring-shapes"></g>
        <circle cx="450" cy="250" r="88" fill="#080808" />
        <image
          id="center-logo"
          href="./new.svg"
          preserveAspectRatio="xMidYMid meet"
          style="filter: brightness(0) invert(1);"
        />
        <g id="ring-text" clip-path="url(#card-clip)"></g>

      </svg>
    </div>

    <script>
      const svgNS = "http://www.w3.org/2000/svg";
      const cx = 450, cy = 250;

      /* ── Chaotic micro-shifts (same rhythm as index.html) ─────────── */
      const shifts = [0, -3, 5, -2, 4, -5, 3, -1, 6, -4];
      function chaoticOffset(i, base) {
        return base + shifts[i % shifts.length];
      }

      /* ── Info ─────────────────────────────────────────────────────────
         cw=true  → sweep=1 (по часовой):    75% = верх
         cw=false → sweep=0 (против часовой): 75% = низ
      ─────────────────────────────────────────────────────────────────── */
      const info = [
        { text: "ПОП-АП РЕСТОРАН",
          r: 110, cw: true,  base: 75, size: 15, ls: 3.0 },   // верх-центр

        { text: "+7\u00A0495\u00A0555\u00A067\u00A032",
          r: 148, cw: true,  base: 87, size: 15, ls: 4.0 },   // верх-право

        { text: "RADIUS-POPUP.RU",
          r: 184, cw: false, base: 75, size: 15, ls: 3.0 },   // низ-центр

        { text: "ТОЛЬКО ПО ПРЕДВАРИТЕЛЬНОМУ БРОНИРОВАНИЮ",
          r: 222, cw: true,  base: 62, size: 11, ls: 1.6 },   // верх-лево

        { text: "СЕВАСТОПОЛЬ \u00B7 СЕЛО РОДНОЕ \u00B7 ВИНОДЕЛЬНЯ BELMAS",
          r: 258, cw: true,  base: 45, size: 11, ls: 1.2 },   // лево (дуга CW 45% безопасна: r=258 выходит только вверх/вниз, но не влево)
      ];

      /* ── Decorative rings ─────────────────────────────────────────── */
      const ringShapes   = document.getElementById("ring-shapes");
      const textRadiiSet = new Set(info.map(d => d.r));


      /* ── Logo ─────────────────────────────────────────────────────── */
      const logoW = 148, logoH = logoW / (204.04 / 57.14);
      const logo  = document.getElementById("center-logo");
      logo.setAttribute("x",      cx - logoW / 2);
      logo.setAttribute("y",      cy - logoH / 2);
      logo.setAttribute("width",  logoW);
      logo.setAttribute("height", logoH);

      /* ── Text on rings ────────────────────────────────────────────── */
      const cardDefs = document.getElementById("card-defs");
      const ringText  = document.getElementById("ring-text");

      info.forEach(({ text, r, cw, base, size, ls }, i) => {
        const pathId = `ring-${i}`;
        const path   = document.createElementNS(svgNS, "path");
        const sweep  = cw ? 1 : 0;
        path.setAttribute("id", pathId);
        path.setAttribute("d",
          `M ${cx + r} ${cy}` +
          ` A ${r} ${r} 0 1 ${sweep} ${cx - r} ${cy}` +
          ` A ${r} ${r} 0 1 ${sweep} ${cx + r} ${cy}`);
        cardDefs.appendChild(path);

        const textEl = document.createElementNS(svgNS, "text");
        textEl.setAttribute("fill",           "#ffffff");
        textEl.setAttribute("font-family",    "'PT Mono', 'Courier New', monospace");
        textEl.setAttribute("font-size",      size);
        textEl.setAttribute("letter-spacing", ls);
        textEl.setAttribute("opacity",        "0.90");

        const tp = document.createElementNS(svgNS, "textPath");
        tp.setAttribute("href",        `#${pathId}`);
        tp.setAttribute("startOffset", `${chaoticOffset(i, base)}%`);
        tp.setAttribute("text-anchor", "middle");
        tp.textContent = text;

        textEl.appendChild(tp);
        ringText.appendChild(textEl);
      });
    </script>
  </body>
</html>
